      function parseREF() {
        // 현재 URL에서 Query String 가져오기
        const queryString = window.location.search

        // Query String을 파싱하여 객체로 변환하는 함수
        function parseQueryString(queryString) {
          const params = {}
          const queryParams = queryString.substring(1).split('&')
          for (let i = 0; i < queryParams.length; i++) {
            const pair = queryParams[i].split('=')
            const key = decodeURIComponent(pair[0])
            const value = decodeURIComponent(pair[1])
            params[key] = value
          }
          return params
        }

        // Query String 파싱
        const queryParams = parseQueryString(queryString)
        const signedREF = queryParams.REF

        const REF_Object = {
          flag: false,
          signedREF,
          deploy: undefined,
        }
        if (signedREF) {
          try {
            const obj = PUBLISHED_BOOKS_DATA.find(
              (item) => item.NewBookCode === signedREF.toUpperCase(),
            )
            if (obj) {
              const NewBookCode = obj.NewBookCode.toUpperCase()
              REF_Object.deploy = {
                LevelName: `${NewBookCode.substring(0, 2)}-${NewBookCode.substring(2, 4)}-${NewBookCode.substring(4)}`,
                LevelRoundId: obj.LevelRoundId,
                referer: '/Library/PublishedBookQR/' + signedREF,
              }
              REF_Object.flag = true
            }
          } catch (error) {}
        }
        return REF_Object
      }

      function init() {
        const parsedRef = parseREF()
        if (!parsedRef.flag) {
          throw Error('REF Validate Failed.')
        }

        checkAndNext(parsedRef)
      }

      function checkAndNext(parsedRef) {
        const REF = parsedRef.deploy

        const url = './BookReadingTrial/index.html'
        let studyInfoData = undefined
        const refInData = encodeURIComponent(
          btoa(
            JSON.stringify({
              LevelName: REF.LevelName,
              LevelRoundId: REF.LevelRoundId,
              BookType: 'EB',
              User: 'student',
              Mode: 'trial',
              level: REF.LevelName.substring(3, 5),
              isStartSpeak: false,
              referer: REF.referer,
              exitUrl: REF.referer,
              logoutUrl: REF.referer,
              unit: 'dodo',
              language: 'en',
              device: '',
              bookcode: parsedRef.signedREF,
            }),
          ),
        )

        if (REF && url) {
          sessionStorage.setItem('REF', refInData)
          sessionStorage.setItem('apiStudyInfo', studyInfoData)
          location.replace(url)
        }
      }
